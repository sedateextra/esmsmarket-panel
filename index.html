<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESMSMarket Admin Panel</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<link rel="stylesheet" href="css/style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<!-- LOADING -->
<div id="loading-overlay" class="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">Yükleniyor...</div>
</div>
<div class="timeout-warning" id="timeout-warning">
  <i class="ti ti-clock" style="margin-right:6px"></i>Oturum <span id="timeout-countdown">5</span> dakika içinde kapanacak!
</div>

<!-- LOGIN -->
<div id="login-screen" class="login-wrap hidden">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ti ti-device-sim" style="font-size:24px;color:#fff"></i></div>
      <h2>ESMSMarket</h2>
      <p>Admin Paneli</p>
    </div>
    <div class="frow"><label>Kullanıcı Adı</label><input type="text" id="login-user" placeholder="kullanici_adi" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <div class="frow"><label>Şifre</label><input type="password" id="login-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn-grad" onclick="doLogin()">Giriş Yap</button>
    <div id="login-err" class="err-msg"></div>
    <div class="demo-accounts">
      <div class="demo-item" onclick="fillDemo('jordan')"><span class="demo-item-name">jordan</span><span class="demo-item-role">Yönetici</span></div>
      <div class="demo-item" onclick="fillDemo('brad')"><span class="demo-item-name">brad</span><span class="demo-item-role">Yönetici</span></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-screen" class="hidden">
  <div class="dash">

    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-logo">
        <div class="topbar-logo-icon"><i class="ti ti-device-sim"></i></div>
        <h1>ESMSMarket</h1>
      </div>
      <div class="topbar-right">
        <span class="badge-live"><span class="glow-dot"></span> Canlı</span>
        <div class="session-timer"><i class="ti ti-clock" style="font-size:13px"></i><span id="session-display">30:00</span></div>
        <div class="user-chip">
          <div class="user-avatar" id="user-avatar"><span id="user-initials">?</span></div>
          <span id="user-name-display">—</span>
          <span style="color:var(--purple);font-size:10px" id="user-role-display"></span>
        </div>
        <button class="btn-sm" onclick="toggleTheme()" title="Tema"><i class="ti ti-sun"></i></button>
        <button class="btn-sm" onclick="doLogout()" style="border-color:rgba(239,68,68,.4);color:var(--danger)"><i class="ti ti-logout"></i> Çıkış</button>
      </div>
    </div>

    <!-- NAV -->
    <nav class="nav">
      <button class="active" onclick="showPage('dashboard',this)"><i class="ti ti-dashboard" style="font-size:16px"></i><span>Dashboard</span></button>
      <button onclick="showPage('musteriler',this)"><i class="ti ti-users" style="font-size:16px"></i><span>Üyeler</span></button>
      <button onclick="showPage('islem',this)"><i class="ti ti-plus" style="font-size:16px"></i><span>İşlem ekle</span></button>
      <button onclick="showPage('kasa',this)"><i class="ti ti-cash" style="font-size:16px"></i><span>Kasa</span></button>
      <button onclick="showPage('borclu',this)"><i class="ti ti-alert-triangle" style="font-size:16px"></i><span>Borçlular</span></button>
      <button onclick="showPage('top10',this)"><i class="ti ti-trophy" style="font-size:16px"></i><span>Top 10</span></button>
      <button onclick="showPage('bonus-rules',this)"><i class="ti ti-gift" style="font-size:16px"></i><span>Hediye kuralları</span></button>
      <button onclick="showPage('sms-takip',this)"><i class="ti ti-message" style="font-size:16px"></i><span>SMS Takip</span></button>
      <button onclick="showPage('excel',this)"><i class="ti ti-file-spreadsheet" style="font-size:16px"></i><span>Excel güncelle</span></button>
      <button onclick="showPage('log',this)"><i class="ti ti-list" style="font-size:16px"></i><span>Log</span></button>
    </nav>

    <!-- SAYFALAR — içerik JS tarafından render edilir -->
    <div id="page-dashboard" class="page active"></div>
    <div id="page-musteriler" class="page"></div>
    <div id="page-islem" class="page"></div>
    <div id="page-kasa" class="page"></div>
    <div id="page-borclu" class="page"></div>
    <div id="page-top10" class="page"></div>
    <div id="page-bonus-rules" class="page"></div>
    <div id="page-sms-takip" class="page"></div>
    <div id="page-excel" class="page"></div>
    <div id="page-log" class="page"></div>

  </div>
</div>

<script>
function toggleTheme(){
  document.body.classList.toggle("light-theme");
  localStorage.setItem("esms_theme", document.body.classList.contains("light-theme")?"light":"dark");
}
if(localStorage.getItem("esms_theme")==="light") document.body.classList.add("light-theme");
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
